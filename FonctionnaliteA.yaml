openapi: 3.0.3
info:
  title: API Federation of Agricultural Collectives
  version: 1.0.0
  description: API for management and digitalization of agricultural collective federation processes in Madagascar.

servers:
  - url: https://localhost:8080

paths:
  /collectives:
    post:
      summary: Create a new collective
      operationId: createCollective
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/NewCollective'
      responses:
        '201':
          description: Collective created successfully
        '400':
          description: Requirements not met