openapi: 3.0.3
info:
  title: API Fédération de Collectivités Agricoles
  version: 1.0.0
  description: API de gestion pour la digitalisation des processus de la fédération des collectivités agricoles à Madagascar.

servers:
  -url: https://localhost:8080

paths:
  /collectivites:
    post:
      summary: Ouvrir une nouvelle collectivité

      operationId: createCollectivite
      
      requestBody:
        required: true
      
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/NouvelleCollectivite'
      
      responses:
        '201':
          description: Collectivité créée avec succès
        '400':
          description: Conditions non remplies