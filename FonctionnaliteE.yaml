openapi: 3.0.3
info:
  title: API Fédération de Collectivités Agricoles
  version: 1.0.0
  description: API de gestion pour la digitalisation des processus de la fédération des collectivités agricoles à Madagascar.

servers:
  -url: https://localhost:8080

paths:
  /collectivites/{collectiviteId}/activites:
    post:
      summary: Planifier une nouvelle activité
      operationId: createActivite
      parameters:
        - $ref: '#/components/parameters/collectiviteIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activite'
      responses:
        '201':
          description: Activité planifiée