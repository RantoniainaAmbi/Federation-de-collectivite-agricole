openapi: 3.0.3
info:
  title: API Federation of Agricultural Collectives
  version: 1.0.0
  description: API for management and digitalization of agricultural collective federation processes in Madagascar.

servers:
  - url: https://localhost:8080

paths:
  /collectives/{collectiveId}/activities:
    post:
      summary: Plan a new activity
      operationId: createActivity
      parameters:
        - $ref: '../components/parameters.yaml#/collectiveIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yaml#/Activity'
      responses:
        '201':
          description: Activity planned