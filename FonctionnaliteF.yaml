openapi: 3.0.3
info:
  title: API Federation of Agricultural Collectives
  version: 1.0.0
  description: API for management and digitalization of agricultural collective federation processes in Madagascar.

servers:
  - url: https://localhost:8080

paths:
  /activities/{activityId}/attendances:
    post:
      summary: Record activity attendance sheet
      operationId: recordAttendances
      parameters:
        - name: activityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yaml#/AttendanceSheet'
      responses:
        '200':
          description: Attendances recorded