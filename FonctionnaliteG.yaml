openapi: 3.0.3
info:
  title: API Federation of Agricultural Collectives
  version: 1.0.0
  description: API for management and digitalization of agricultural collective federation processes in Madagascar.

servers:
  - url: https://localhost:8080

paths:
  /collectives/{collectiveId}/statistics/attendance:
    get:
      summary: Monthly global report of the collective
      operationId: getGlobalStatistics
      parameters:
        - $ref: '../components/parameters.yaml#/collectiveIdParam'
        - name: month
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-04'
      responses:
        '200':
          description: Global statistics generated
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/GlobalStatistics'

  /collectives/{collectiveId}/members/{memberId}/statistics:
    get:
      summary: Detailed statistics of an active member
      operationId: getMemberStatistics
      parameters:
        - $ref: '../components/parameters.yaml#/collectiveIdParam'
        - name: memberId
          in: path
          required: true
          schema:
            type: string
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Detailed member statistics
          content:
            application/json:
              schema:
                $ref: '../components/schemas.yaml#/MemberStatistics'