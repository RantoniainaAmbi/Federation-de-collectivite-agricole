NewCollective:
  type: object
  required: [name, city, specialty, federationAuthorization, initialMembers]
  properties:
    name: { type: string }
    city: { type: string }
    specialty: { type: string }
    federationAuthorization: { type: boolean }
    initialMembers:
      type: array
      minItems: 10
      items:
        type: object
        properties:
          memberId: { type: string }
          position: { $ref: '#/Position' }

NewMember:
  type: object
  required: [name, firstName, dateOfBirth, gender, address, profession, phone, email, sponsorId, adhesionFees]
  properties:
    name: { type: string }
    firstName: { type: string }
    dateOfBirth: { type: string, format: date }
    gender: { type: string, enum: [FEMALE, MALE] }
    address: { type: string }
    profession: { type: string }
    phone: { type: string }
    email: { type: string, format: email }
    sponsorId: { type: string }
    adhesionFees:
      type: object
      properties:
        paid: { type: boolean }
        amount: { type: number, example: 50000 }
        paymentMethod: { $ref: '#/PaymentMethod' }

Position:
  type: string
  enum: [PRESIDENT, VICE_PRESIDENT, TREASURER, SECRETARY, CONFIRMED_MEMBER, JUNIOR_MEMBER]

PaymentMethod:
  type: string
  enum: [CASH, BANK_TRANSFER, MOBILE_MONEY]

Contribution:
  type: object
  required: [memberId, amount, collectionDate, paymentMethod, type]
  properties:
    memberId: { type: string }
    amount: { type: number }
    collectionDate: { type: string, format: date-time }
    paymentMethod: { $ref: '#/PaymentMethod' }
    type: { type: string, enum: [PERIODIC, EXCEPTIONAL] }

Account:
  type: object
  required: [accountType, balance]
  properties:
    accountType: { type: string, enum: [CASH, BANK, MOBILE_MONEY] }
    balance: { type: number }
    currency: { type: string, default: MGA }
    holder: { type: string }
    bank: { type: string, enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM] }
    rib: { type: string, pattern: '^\d{23}$' }
    mobileService: { type: string, enum: [Orange Money, Mvola, Airtel Money] }
    mobilePhone: { type: string }

Activity:
  type: object
  required: [type, date, mandatoryFor]
  properties:
    type: { type: string, enum: [MONTHLY_GENERAL_ASSEMBLY, JUNIOR_TRAINING, EXCEPTIONAL] }
    date: { type: string, format: date-time }
    mandatoryFor: { type: string, enum: [ALL, JUNIORS, SOME, NONE] }
    topic: { type: string }

AttendanceSheet:
  type: object
  required: [memberId, status]
  properties:
    memberId: { type: string }
    status: { type: string, enum: [PRESENT, EXCUSED, ABSENT] }
    excuseReason: { type: string }
    externalVisitor: { type: boolean, default: false }

GlobalStatistics:
  type: object
  properties:
    registeredMembersCount: { type: integer }
    globalAttendanceRate: { type: number, format: float }

MemberStatistics:
  type: object
  properties:
    attendanceRate: { type: number, format: float }
    collectedAmount: { type: number }
    potentialUnpaidAmount: { type: number }